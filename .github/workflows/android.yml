name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: 4.2.2
      GODOT_STATUS: stable
      EXPORT_NAME: lanball

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64 godot
          chmod +x godot
          ./godot --version

      - name: Download Godot export templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz" -O templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          unzip -q templates.tpz -d templates
          mv templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}/"

      - name: Create debug keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Fix project renderer
        run: |
          cat > project.godot <<EOF
          config_version=5

          [application]

          config/name="LANBall"
          run/main_scene="res://scenes/Main.tscn"
          config/features=PackedStringArray("4.2", "Mobile")

          [display]

          window/size/viewport_width=1280
          window/size/viewport_height=720
          window/stretch/mode="canvas_items"
          window/stretch/aspect="expand"

          [rendering]

          renderer/rendering_method="gl_compatibility"
          renderer/rendering_method.mobile="gl_compatibility"
          EOF

      - name: Create Android export preset
        run: |
          cat > export_presets.cfg <<EOF
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/lanball.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false
          script_export_mode=2

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""

          gradle_build/use_gradle_build=false
          gradle_build/export_format=0

          architectures/armeabi-v7a=false
          architectures/arm64-v8a=true
          architectures/x86_64=false

          version/code=1
          version/name="1.0"

          package/unique_name="com.nutex.lanball"
          package/name="LANBall"
          package/signed=true
          package/app_category=2
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false

          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""

          keystore/debug="$HOME/.android/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""

          one_click_deploy/clear_previous_install=true

          graphics/opengl_debug=false
          xr_features/xr_mode=0

          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true

          user_data_backup/allow=false
          command_line/extra_args=""

          apk_expansion/enable=false
          apk_expansion/SALT=""
          apk_expansion/public_key=""

          permissions/custom_permissions=PackedStringArray()
          permissions/internet=true
          permissions/access_network_state=true
          EOF

      - name: Configure Godot Android export
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Build APK
        run: |
          mkdir -p build
          ./godot --headless --path . --export-debug "Android" build/${EXPORT_NAME}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lanball-apk
          path: build/*.apk
